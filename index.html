<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza Order Generator</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Georgia, 'Times New Roman', serif; background: #f7f3e8; color: #1f1f1f; text-align: center; padding: 18px; }
    h1 { margin: 8px 0 4px; font-size: 32px; }
    .sub { margin: 0 0 14px; font-size: 16px; }
    .card { width: min(92vw, 360px); margin: 14px auto; background: #82bd9f; border-radius: 22px; padding: 18px 18px 22px; box-shadow: 0 8px 18px rgba(0,0,0,0.18); min-height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
    .card-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 8px; }
    .order-title { font-size: 42px; }
    .counter { font-size: 15px; font-weight: bold; background: rgba(0,0,0,0.18); color: #fff; padding: 5px 12px; border-radius: 99px; font-family: Arial, Helvetica, sans-serif; }
    .pizza { position: relative; width: 270px; height: 270px; border-radius: 50%; background: #d91e2b; border: 22px solid #d9d08c; box-shadow: inset 0 0 0 2px #fff4d6; overflow: hidden; }
    .topping { position: absolute; transform: translate(-50%, -50%); }
    .cheese   { width: 44px; height: 44px; background: #f5d800; border-radius: 3px; border: 2px solid #fff; }
    .mushroom { width: 44px; height: 44px; background: #8a8a7a; border-radius: 3px; border: 2px solid #fff; }
    .pepper   { width: 44px; height: 44px; background: #2e9e3a; border-radius: 3px; border: 2px solid #fff; }
    .sausage  { width: 44px; height: 44px; background: #cc2222; border-radius: 3px; border: 2px solid #fff; }
    .ham      { width: 44px; height: 44px; background: #e85ca0; border-radius: 3px; border: 2px solid #fff; }
    .olive    { width: 44px; height: 44px; background: #1a1a1a; border-radius: 3px; border: 2px solid #fff; }
    .pill-swatch { display: inline-block; width: 16px; height: 16px; border-radius: 3px; border: 2px solid #fff; outline: 1px solid rgba(0,0,0,0.15); vertical-align: middle; margin-right: 7px; flex-shrink: 0; }
    .price { font-size: 42px; margin: 12px 0 0; }
    .difficulty { font-size: 24px; margin-top: 3px; }
    .ingredients { background: #fffdf5; border-radius: 18px; padding: 12px; margin: 12px auto; max-width: 420px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
    .ingredients h2 { margin: 0 0 10px; font-size: 20px; }
    .list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; font-size: 18px; text-align: left; }
    .pill { background: #f0ead6; padding: 8px 10px; border-radius: 999px; }
    .controls { max-width: 420px; margin: 12px auto 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button, select { font-size: 17px; padding: 13px 10px; border-radius: 12px; border: none; font-weight: bold; font-family: Arial, Helvetica, sans-serif; }
    button { background: #d62828; color: white; cursor: pointer; }
    button.secondary { background: #333; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    select { background: white; grid-column: span 2; }
    .status { font-family: Arial, Helvetica, sans-serif; font-size: 14px; margin-top: 8px; color: #555; min-height: 20px; }
    .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 13px; color: #555; max-width: 420px; margin: 10px auto; line-height: 1.35; }
  </style>
</head>
<body>
  <h1>Pizza Order Generator</h1>
  <p class="sub">Digital order deck for testing — no printing needed.</p>
  <div class="card">
    <div class="card-header">
      <div class="order-title">Order</div>
      <div id="counter" class="counter">—</div>
    </div>
    <div id="pizza" class="pizza"></div>
    <div>
      <div id="price" class="price">£10</div>
      <div id="difficulty" class="difficulty">Easy</div>
    </div>
  </div>
  <div class="ingredients">
    <h2 id="orderName">Tap Next Order to start</h2>
    <div id="ingredientList" class="list"></div>
  </div>
  <div class="controls">
    <select id="mode">
      <option value="deck">Full shuffled 30-card deck</option>
      <option value="random">Random endless orders</option>
      <option value="easy">Easy only</option>
      <option value="medium">Medium only</option>
      <option value="hard">Hard only</option>
    </select>
    <button id="nextBtn" onclick="nextOrder()">Next Order</button>
    <button class="secondary" onclick="resetDeck()">Reset Deck</button>
  </div>
  <div id="status" class="status"></div>
  <p class="tiny">Test rule: players only need to match the ingredient amounts shown. Shape and layout is illustrative.</p>

  <script>
    const C=135, R=113;
    const toppingSizes={cheese:22,mushroom:22,pepper:22,sausage:22,ham:22,olive:22};
    const layer={cheese:1,mushroom:4,pepper:5,ham:6,sausage:12,olive:14};
    const ingredients=[
      {name:'Cheese',key:'cheese'},{name:'Mushroom',key:'mushroom'},
      {name:'Pepper',key:'pepper'},{name:'Sausage',key:'sausage'},
      {name:'Ham',key:'ham'},{name:'Olive',key:'olive'}
    ];
    const DS={
      easy:  {label:'Easy',  price:10,cards:15,minTypes:2,maxTypes:3,minTotal:3,maxTotal:5},
      medium:{label:'Medium',price:20,cards:10,minTypes:3,maxTypes:5,minTotal:6,maxTotal:8},
      hard:  {label:'Hard',  price:30,cards:5, minTypes:5,maxTypes:6,minTotal:9,maxTotal:12}
    };
    let deck=[],used=0;

    
    const orderBell = new Audio('856337__loafdv__metal-bell-ding.mp3');

    function playDing(){
      orderBell.currentTime = 0;
      orderBell.play().catch(()=>{});
    }

const randF=(a,b)=>Math.random()*(b-a)+a;
    const randI=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=randI(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}

    function makeOrder(dk){
      const s=DS[dk],counts={cheese:2};
      const others=ingredients.filter(i=>i.key!=='cheese');
      const otherTotal=Math.max(1,randI(s.minTotal,s.maxTotal)-2);
      const typeCount=Math.min(randI(s.minTypes,s.maxTypes),others.length+1);
      const chosen=shuffle([...others]).slice(0,Math.max(1,typeCount-1));
      chosen.forEach(i=>counts[i.key]=1);
      let rem=otherTotal-chosen.length;
      while(rem>0){counts[chosen[randI(0,chosen.length-1)].key]++;rem--;}
      return {difficultyKey:dk,difficulty:s.label,price:s.price,counts};
    }

    function buildDeck(){
      deck=[];
      Object.keys(DS).forEach(k=>{for(let i=0;i<DS[k].cards;i++)deck.push(makeOrder(k));});
      shuffle(deck);used=1;
    }

    function updateCounter(){
      const mode=document.getElementById('mode').value,btn=document.getElementById('nextBtn');
      document.getElementById('counter').textContent=mode==='deck'?used+' / 30':'∞';
      if(mode==='deck'&&used>=30){btn.textContent='Game Over';btn.disabled=true;}
      else{btn.textContent='Next Order';btn.disabled=false;}
    }

    function resetDeck(){
      document.getElementById('mode').value='deck';
      buildDeck();showOrder(deck[0]);
      document.getElementById('status').textContent='Deck reset — 30 cards shuffled.';
      updateCounter();
    }

    function getOrderByMode(){
      const mode=document.getElementById('mode').value;
      if(mode==='random')return makeOrder(['easy','medium','hard'][randI(0,2)]);
      if(mode in DS)return makeOrder(mode);
      if(used>=deck.length){        document.getElementById('status').textContent='All 30 orders played! Winner has most cash.';
        document.getElementById('nextBtn').textContent='Game Over';
        document.getElementById('nextBtn').disabled=true;
        return null;
      }
      const order=deck[used++];
      document.getElementById('status').textContent='Card '+used+' of 30';
      return order;
    }

    function nextOrder(){const o=getOrderByMode();if(o){playDing();showOrder(o);updateCounter();}}

    function buildCandidates(minHalf){
      const safe=R-minHalf-2,step=safe*0.28,pts=[];
      for(let gx=-safe;gx<=safe;gx+=step){
        for(let gy=-safe;gy<=safe;gy+=step){
          const jx=gx+randF(-step*0.45,step*0.45),jy=gy+randF(-step*0.45,step*0.45);
          if(jx*jx+jy*jy<=safe*safe)pts.push([C+jx,C+jy]);
        }
      }
      return shuffle(pts);
    }

    function placeToppings(toppingKeys){
      const minHalf=Math.min(...toppingKeys.map(k=>toppingSizes[k]));
      let candidates=buildCandidates(minHalf);
      const placed=[];
      for(const key of toppingKeys){
        const half=toppingSizes[key],maxR=R-half-2;
        const valid=candidates.filter(([cx,cy])=>{const dx=cx-C,dy=cy-C;return dx*dx+dy*dy<=maxR*maxR;});
        if(valid.length===0){
          const a=randF(0,Math.PI*2),r=Math.sqrt(randF(0,1))*maxR;
          placed.push({cx:C+Math.cos(a)*r,cy:C+Math.sin(a)*r,half,key});
          continue;
        }
        let best=null,bestScore=-1;
        for(const [cx,cy] of valid){
          let minDist=Infinity;
          for(const p of placed){const d=Math.hypot(cx-p.cx,cy-p.cy);if(d<minDist)minDist=d;}
          if(placed.length===0)minDist=Math.hypot(cx-C,cy-C);
          if(minDist>bestScore){bestScore=minDist;best=[cx,cy];}
        }
        placed.push({cx:best[0],cy:best[1],half,key});
        const minGap=half+minHalf+2;
        candidates=candidates.filter(([cx,cy])=>Math.hypot(cx-best[0],cy-best[1])>minGap);
      }
      return placed;
    }

    function showOrder(order){
      const pizza=document.getElementById('pizza'),list=document.getElementById('ingredientList');
      pizza.innerHTML='';list.innerHTML='';
      document.getElementById('price').textContent='£'+order.price;
      document.getElementById('difficulty').textContent=order.difficulty;
      document.getElementById('orderName').textContent=order.difficulty+' Pizza Order';
      const swatchColour={cheese:'#f5d800',mushroom:'#8a8a7a',pepper:'#2e9e3a',sausage:'#cc2222',ham:'#e85ca0',olive:'#1a1a1a'};
      Object.entries(order.counts).forEach(([key,amount])=>{
        const ing=ingredients.find(i=>i.key===key);
        const pill=document.createElement('div');
        pill.className='pill';
        pill.style.display='flex';
        pill.style.alignItems='center';
        const sw=document.createElement('span');
        sw.className='pill-swatch';
        sw.style.background=swatchColour[key];
        pill.appendChild(sw);
        pill.appendChild(document.createTextNode(amount+' × '+ing.name));
        list.appendChild(pill);
      });
      const sizeOrder=['ham','cheese','pepper','mushroom','sausage','olive'];
      const allKeys=[];
      sizeOrder.forEach(k=>{const n=order.counts[k]||0;for(let i=0;i<n;i++)allKeys.push(k);});
      const placed=placeToppings(allKeys);
      const drawOrder=['cheese','mushroom','pepper','ham','sausage','olive'];
      const byKey={};
      placed.forEach(p=>{(byKey[p.key]=byKey[p.key]||[]).push(p);});
      drawOrder.forEach(key=>{
        (byKey[key]||[]).forEach(p=>{
          const el=document.createElement('div');
          el.className='topping '+key;
          el.style.left=p.cx+'px';el.style.top=p.cy+'px';
          el.style.transform='translate(-50%,-50%) rotate('+randI(-35,35)+'deg)';
          el.style.zIndex=layer[key]||8;
          pizza.appendChild(el);
        });
      });
    }

    buildDeck();showOrder(deck[0]);
    document.getElementById('status').textContent='Ready — tap Next Order to start.';
    updateCounter();
  </script>
</body>
</html>
